---
- name: Deploy FoodRush with Docker Compose
  hosts: app_servers
  gather_facts: true

  vars:
    foodrush_local_project_dir: "{{ playbook_dir }}/../.."
    foodrush_local_archive: "{{ foodrush_local_project_dir }}/.ansible/foodrush-deploy.tar.gz"

  tasks:
    - name: Ensure local Ansible artifact directory exists
      ansible.builtin.file:
        path: "{{ foodrush_local_project_dir }}/.ansible"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: Build local deployment archive
      ansible.builtin.archive:
        path: "{{ foodrush_local_project_dir }}/"
        dest: "{{ foodrush_local_archive }}"
        format: gz
        exclude_path:
          - "{{ foodrush_local_project_dir }}/.git"
          - "{{ foodrush_local_project_dir }}/.ansible"
          - "{{ foodrush_local_project_dir }}/.pycache"
      delegate_to: localhost
      become: false

    - name: Create remote project directory
      ansible.builtin.file:
        path: "{{ foodrush_project_root }}"
        state: directory
        mode: "0755"
      become: true

    - name: Remove previous remote project contents
      ansible.builtin.file:
        path: "{{ foodrush_project_root }}"
        state: absent
      become: true

    - name: Recreate remote project directory
      ansible.builtin.file:
        path: "{{ foodrush_project_root }}"
        state: directory
        mode: "0755"
      become: true

    - name: Copy deployment archive to remote host
      ansible.builtin.copy:
        src: "{{ foodrush_local_archive }}"
        dest: "{{ foodrush_project_root }}/foodrush-deploy.tar.gz"
        mode: "0644"
      become: true

    - name: Extract deployment archive on remote host
      ansible.builtin.unarchive:
        src: "{{ foodrush_project_root }}/foodrush-deploy.tar.gz"
        dest: "{{ foodrush_project_root }}"
        remote_src: true
      become: true

    - name: Remove deployment archive from remote host
      ansible.builtin.file:
        path: "{{ foodrush_project_root }}/foodrush-deploy.tar.gz"
        state: absent
      become: true

    - name: Render environment file
      ansible.builtin.template:
        src: ../templates/env.j2
        dest: "{{ foodrush_project_root }}/.env"
        mode: "0600"
      become: true

    - name: Validate environment configuration
      ansible.builtin.command: ./scripts/validate_env.sh
      args:
        chdir: "{{ foodrush_project_root }}"
      become: true

    - name: Stop previous FoodRush Compose stack if it exists
      ansible.builtin.command: docker compose down --remove-orphans
      args:
        chdir: "{{ foodrush_project_root }}"
      become: true
      changed_when: false

    - name: Remove legacy FoodRush containers with fixed names
      ansible.builtin.command:
        argv:
          - docker
          - rm
          - -f
          - foodrush-frontend
          - auth-service
          - product-service
          - order-service
          - user-service
          - chat-service
          - payment-service
          - auth-db
          - product-db
          - order-db
          - chat-db
          - payment-db
          - foodrush-prometheus
          - foodrush-grafana
      become: true
      changed_when: false
      failed_when: false

    - name: Start FoodRush stack with Docker Compose
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: "{{ foodrush_project_root }}"
      become: true

    - name: Show Compose service status
      ansible.builtin.command: docker compose ps
      args:
        chdir: "{{ foodrush_project_root }}"
      register: compose_ps
      changed_when: false
      become: true

    - name: Print Compose service status
      ansible.builtin.debug:
        var: compose_ps.stdout_lines
