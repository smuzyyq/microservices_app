services:
  frontend:
    image: foodrush-frontend:latest
    ports:
      - "8080:80"
    networks:
      - foodrush-overlay
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  auth-service:
    image: foodrush-auth-service:latest
    environment:
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL}
      USER_DATABASE_URL: ${USER_DATABASE_URL}
      CHAT_DATABASE_URL: ${CHAT_DATABASE_URL}
      PAYMENT_DATABASE_URL: ${PAYMENT_DATABASE_URL}
      PRODUCT_SERVICE_URL: http://product-service:8002/products
      ORDER_SERVICE_URL: http://order-service:8003/orders
      PAYMENT_SERVICE_URL: http://payment-service:8006/payments
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - foodrush-overlay
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  product-service:
    image: foodrush-product-service:latest
    environment:
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL}
      USER_DATABASE_URL: ${USER_DATABASE_URL}
      CHAT_DATABASE_URL: ${CHAT_DATABASE_URL}
      PAYMENT_DATABASE_URL: ${PAYMENT_DATABASE_URL}
      PRODUCT_SERVICE_URL: http://product-service:8002/products
      ORDER_SERVICE_URL: http://order-service:8003/orders
      PAYMENT_SERVICE_URL: http://payment-service:8006/payments
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - foodrush-overlay
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  order-service:
    image: foodrush-order-service:latest
    environment:
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL}
      USER_DATABASE_URL: ${USER_DATABASE_URL}
      CHAT_DATABASE_URL: ${CHAT_DATABASE_URL}
      PAYMENT_DATABASE_URL: ${PAYMENT_DATABASE_URL}
      PRODUCT_SERVICE_URL: http://product-service:8002/products
      ORDER_SERVICE_URL: http://order-service:8003/orders
      PAYMENT_SERVICE_URL: http://payment-service:8006/payments
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - foodrush-overlay
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  user-service:
    image: foodrush-user-service:latest
    environment:
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL}
      USER_DATABASE_URL: ${USER_DATABASE_URL}
      CHAT_DATABASE_URL: ${CHAT_DATABASE_URL}
      PAYMENT_DATABASE_URL: ${PAYMENT_DATABASE_URL}
      PRODUCT_SERVICE_URL: http://product-service:8002/products
      ORDER_SERVICE_URL: http://order-service:8003/orders
      PAYMENT_SERVICE_URL: http://payment-service:8006/payments
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - foodrush-overlay
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  chat-service:
    image: foodrush-chat-service:latest
    environment:
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL}
      USER_DATABASE_URL: ${USER_DATABASE_URL}
      CHAT_DATABASE_URL: ${CHAT_DATABASE_URL}
      PAYMENT_DATABASE_URL: ${PAYMENT_DATABASE_URL}
      PRODUCT_SERVICE_URL: http://product-service:8002/products
      ORDER_SERVICE_URL: http://order-service:8003/orders
      PAYMENT_SERVICE_URL: http://payment-service:8006/payments
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - foodrush-overlay
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  payment-service:
    image: foodrush-payment-service:latest
    environment:
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL}
      USER_DATABASE_URL: ${USER_DATABASE_URL}
      CHAT_DATABASE_URL: ${CHAT_DATABASE_URL}
      PAYMENT_DATABASE_URL: ${PAYMENT_DATABASE_URL}
      PRODUCT_SERVICE_URL: http://product-service:8002/products
      ORDER_SERVICE_URL: http://order-service:8003/orders
      PAYMENT_SERVICE_URL: http://payment-service:8006/payments
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - foodrush-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  auth-db:
    image: postgres:15
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - foodrush-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  product-db:
    image: postgres:15
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - foodrush-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  order-db:
    image: postgres:15
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - foodrush-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  chat-db:
    image: postgres:15
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    networks:
      - foodrush-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  payment-db:
    image: postgres:15
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    networks:
      - foodrush-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  prometheus:
    image: foodrush-prometheus:latest
    ports:
      - "9190:9090"
    networks:
      - foodrush-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  grafana:
    image: foodrush-grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "3300:3000"
    networks:
      - foodrush-overlay
    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:
  auth-db-data:
  product-db-data:
  order-db-data:
  chat-db-data:
  payment-db-data:

networks:
  foodrush-overlay:
    driver: overlay
    attachable: true
