apiVersion: v1
kind: Service
metadata:
  name: chat-db
  namespace: foodrush
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: chat-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chat-db
  namespace: foodrush
spec:
  serviceName: chat-db
  replicas: 1
  selector:
    matchLabels:
      app: chat-db
  template:
    metadata:
      labels:
        app: chat-db
    spec:
      containers:
        - name: chat-db
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: chat_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: foodrush-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foodrush-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: chat-db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d chat_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d chat_db"]
            initialDelaySeconds: 20
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: chat-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
