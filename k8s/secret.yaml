apiVersion: v1
kind: Secret
metadata:
  name: foodrush-secret
  namespace: foodrush
type: Opaque
stringData:
  JWT_SECRET: <CHANGE_ME_JWT_SECRET>
  POSTGRES_USER: <DB_USER>
  POSTGRES_PASSWORD: <DB_PASSWORD>
  GF_SECURITY_ADMIN_USER: <GRAFANA_ADMIN_USER>
  GF_SECURITY_ADMIN_PASSWORD: <GRAFANA_ADMIN_PASSWORD>
