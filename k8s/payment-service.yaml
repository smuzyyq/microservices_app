apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: foodrush
spec:
  selector:
    app: payment-service
  ports:
    - port: 8006
      targetPort: 8006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: foodrush
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
        - name: wait-for-payment-db
          image: postgres:15
          command: ["sh", "-c", "until pg_isready -h payment-db -p 5432 -U \"$POSTGRES_USER\" -d payment_db; do sleep 2; done"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: foodrush-secret
                  key: POSTGRES_USER
      containers:
        - name: payment-service
          image: foodrush-payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: foodrush-config
            - secretRef:
                name: foodrush-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 20
            periodSeconds: 15
