apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: foodrush
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: auth-service
        metrics_path: /metrics
        static_configs:
          - targets: ["auth-service:8001"]
      - job_name: product-service
        metrics_path: /metrics
        static_configs:
          - targets: ["product-service:8002"]
      - job_name: order-service
        metrics_path: /metrics
        static_configs:
          - targets: ["order-service:8003"]
      - job_name: user-service
        metrics_path: /metrics
        static_configs:
          - targets: ["user-service:8004"]
      - job_name: chat-service
        metrics_path: /metrics
        static_configs:
          - targets: ["chat-service:8005"]
      - job_name: payment-service
        metrics_path: /metrics
        static_configs:
          - targets: ["payment-service:8006"]
  alerts.yml: |
    groups:
      - name: foodrush-service-alerts
        rules:
          - alert: OrderServiceDown
            expr: up{job="order-service"} == 0
            for: 1m
            labels:
              severity: critical
              service: order-service
            annotations:
              summary: "Order service is down"
              description: "Prometheus has been unable to scrape order-service metrics for more than 1 minute."
          - alert: OrderServiceDatabaseDisconnected
            expr: order_service_database_connected == 0
            for: 1m
            labels:
              severity: warning
              service: order-service
            annotations:
              summary: "Order service database is disconnected"
              description: "Order service is reachable, but it has been running in degraded mode without database connectivity for more than 1 minute."
          - alert: ProductServiceDown
            expr: up{job="product-service"} == 0
            for: 1m
            labels:
              severity: critical
              service: product-service
            annotations:
              summary: "Product service is down"
              description: "Prometheus has been unable to scrape product-service metrics for more than 1 minute."
          - alert: PaymentServiceDown
            expr: up{job="payment-service"} == 0
            for: 1m
            labels:
              severity: critical
              service: payment-service
            annotations:
              summary: "Payment service is down"
              description: "Prometheus has been unable to scrape payment-service metrics for more than 1 minute."
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: foodrush
spec:
  type: LoadBalancer
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: foodrush
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-storage
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-storage
          emptyDir: {}
