apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: foodrush
spec:
  selector:
    app: chat-service
  ports:
    - port: 8005
      targetPort: 8005
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: foodrush
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      initContainers:
        - name: wait-for-chat-db
          image: postgres:15
          command: ["sh", "-c", "until pg_isready -h chat-db -p 5432 -U \"$POSTGRES_USER\" -d chat_db; do sleep 2; done"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: foodrush-secret
                  key: POSTGRES_USER
      containers:
        - name: chat-service
          image: foodrush-chat-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: foodrush-config
            - secretRef:
                name: foodrush-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 20
            periodSeconds: 15
